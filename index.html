<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffe6f0, #ffccdd);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* 💖 Glass Card */
.container {
    background: rgba(255, 255, 255, 0.2);
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    text-align: center;
    width: 320px;
}

/* ✨ Title Glow */
h2 {
    color: #ff3385;
    text-shadow: 0 0 10px #ff99cc;
    font-size: 22px;
    min-height: 60px;
}

/* 💬 Text */
p {
    color: #444;
}

/* 💌 Input */
input {
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
    width: 90%;
    text-align: center;
    margin-top: 10px;
}

/* 💘 Button */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    background: linear-gradient(45deg, #ff4d88, #ff1a66);
    color: white;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* ❤️ Floating Hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: float 6s linear infinite;
    color: #ff4d88;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}

/* 🌟 Sparkles */
.sparkle {
    position: fixed;
    color: white;
    font-size: 10px;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    0% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0); }
}
</style>

</head>

<body>

<div class="container">

<h2 id="typing"></h2>

<p>Enter our secret word 😌</p>

<input type="password" id="pass" placeholder="Hint: no no try try 😉">

<br>

<button onclick="check()">Enter 💌</button>

</div>

<!-- 🎵 Background Music (optional) -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* ✨ Typing Effect */
let text = "Hey my princess 💖 I made something special just for you...";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

/* 🔐 Password Check */
function check(){
    let p = document.getElementById("pass").value;

    if(p === "alagediya"){
        alert("Aww you remembered 😍❤️ I knew it!");
        window.location.href = "puzzle.html";
    } else {
        alert("Wrong password 😝 but still cute 💕 try again!");
    }
}

/* ❤️ Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 400);

/* 🌟 Sparkles */
setInterval(() => {
    let star = document.createElement("div");
    star.className = "sparkle";
    star.innerHTML = "✨";
    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(star);

    setTimeout(() => star.remove(), 3000);
}, 300);

</script>

</body>
</html>
